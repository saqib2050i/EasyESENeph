# Deploy on Unraid (or any host) by PULLING the prebuilt image from GHCR —
# no local build. Override the image with NEPHRON_IMAGE in a .env file if needed.
#
#   docker compose -f docker-compose.unraid.yml pull
#   docker compose -f docker-compose.unraid.yml up -d
#
# The image is public, so no login is needed to pull it.

services:
  nephron:
    image: ${NEPHRON_IMAGE:-ghcr.io/saqib2050i/easyeseneph:latest}
    container_name: nephron-study
    ports:
      - "8973:8973"                       # point your existing Cloudflare tunnel at http://<unraid-ip>:8973
    environment:
      - DATA_PATH=/data/data.json
      - PORT=8973
      # Login is on by default. Username defaults to 'admin'; leave AUTH_PASSWORD
      # blank to auto-generate one (printed in the logs), or set your own here / in .env.
      - AUTH_USER=${AUTH_USER:-admin}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-}
    volumes:
      - ./data:/data                      # persists the deck + auth secrets on the host
    restart: unless-stopped
